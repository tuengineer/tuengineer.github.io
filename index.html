<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TUE | Crónicas de un Viajero Autónomo</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; /* Fondo casi negro */
            --card-bg: rgba(20, 20, 20, 0.6); /* Grafito con transparencia */
            --border: rgba(255, 255, 255, 0.1);
            --accent-glow: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
            --text-dim: #888;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px 20px;
            /* Fondo con un degradado radial muy sutil para dar profundidad */
            background: radial-gradient(circle at 50% -20%, #1a1a1a 0%, #050505 80%);
            min-height: 100vh;
        }

        header {
            max-width: 1100px;
            margin: 0 auto 60px;
            text-align: left;
        }

        header h1 { font-size: 2.5rem; font-weight: 600; letter-spacing: -1px; margin: 0; }
        header p { color: var(--text-dim); font-size: 1.1rem; margin-top: 10px; }

        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 220px;
            gap: 20px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .item {
            background: var(--card-bg);
            backdrop-filter: blur(12px); /* Efecto cristal iOS */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
        }

        /* Efecto de iluminación al pasar el ratón */
        .item:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(30, 30, 30, 0.7);
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        /* Imagen de fondo en las celdas */
        .item img {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: -1;
            opacity: 0.3; /* Imagen sutil integrada en el grafito */
            transition: opacity 0.4s ease;
        }

        .item:hover img {
            opacity: 0.6;
        }

        .item h2 { font-size: 1.1rem; margin: 0; font-weight: 600; }
        .item p { font-size: 0.9rem; color: var(--text-dim); margin: 8px 0 0; opacity: 0; transition: 0.3s; }
        .item:hover p { opacity: 1; }

        /* Clases de tamaño Bento */
        .large { grid-column: span 2; grid-row: span 2; }
        .wide { grid-column: span 2; }
        .tall { grid-row: span 2; }

        /* Badge de presupuesto (estilo GlassFlow) */
        .badge {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255,255,255,0.1);
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            border: 1px solid var(--border);
        }
